<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makka Carpentry Supplies | إتمام الطلب</title>
    <meta name="description" content="أكمل طلبك من شركة مكة، راجع المنتجات، اختر التوصيل، ثم احفظ الطلب وأرسله بسهولة.">
    <meta property="og:title" content="شركة مكة | إتمام الطلب">
    <meta property="og:description" content="راجع السلة، أدخل بياناتك، وأرسل الطلب إلى شركة مكة بسهولة.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    <meta property="og:locale" content="ar_PS">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
</head>
<body>
    <nav class="navbar scrolled" id="navbar" style="background: rgba(255,250,244,0.96);">
        <a href="index.html" class="brand"><img src="logo.png" alt="AMK" class="brand-logo"><span style="color: var(--primary-dark);">AMK</span></a>
        <div class="nav-links"><a href="index.html" style="color: var(--primary-dark);">الرئيسية</a><a href="category.html?type=%D9%81%D8%B5%D8%A7%D9%84%D9%8A%D8%A7%D8%AA" style="color: var(--primary-dark);">الأقسام</a></div>
        <div class="nav-actions"><div class="cart-icon" style="background: rgba(139,90,43,0.08); color: var(--primary-dark);">📋</div></div>
    </nav>

    <div class="checkout-page">
        <div class="checkout-container">
            <a href="index.html" class="checkout-back-link">← العودة للتسوق</a>
            <h1 class="checkout-title">إتمام الطلب</h1>
            <p class="checkout-status" id="checkoutStatus">جاري تحميل بيانات الطلب...</p>
            <div id="checkoutContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>
    <script>
        var FALLBACK_IMAGE = "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22 viewBox=%220 0 400 400%22%3E%3Crect width=%22400%22 height=%22400%22 fill=%22%23c97a34%22/%3E%3Ctext x=%22200%22 y=%22210%22 font-family=%22Arial%22 font-size=%2248%22 fill=%22%23fff%22 text-anchor=%22middle%22%3EAMK%3C/text%3E%3C/svg%3E";
        var CART_KEY = 'makka_cart';
        var WHOLESALE_KEY = 'makka_wholesale';
        var WHOLESALE_SESSION_KEY = 'makka_wholesale_session';
        var DELIVERY_KEY = 'makka_delivery_method';
        var LEGACY_CART_KEY = 'drenasshop_cart';
        var LEGACY_DELIVERY_KEY = 'drenasshop_delivery_method';
        var DELIVERY_COSTS = { westbank: 20, jerusalem: 30, inside: 50 };
        var DELIVERY_LABELS = { westbank: 'الضفة', jerusalem: 'القدس', inside: 'الداخل', pickup: 'استلام ذاتي' };
        var products = normalizeProducts(DEFAULT_PRODUCTS);
        var discounts = normalizeDiscounts(DEFAULT_DISCOUNTS);
        var siteSettings = normalizeSettings(DEFAULT_SITE_SETTINGS);
        var cart = normalizeCartItems(loadStoredCart(), products);
        var productIndex = {};
        var selectedDelivery = localStorage.getItem(DELIVERY_KEY) || localStorage.getItem(LEGACY_DELIVERY_KEY) || 'delivery';
        var selectedRegion = 'westbank';
        var wholesaleMode = (getQueryParam('wholesale') === 'true') || localStorage.getItem(WHOLESALE_KEY) === 'true';
        var wholesaleSession = loadWholesaleSession();
        var savedLocations = [];
        var selectedSavedLocationValue = '';
        var checkoutFieldErrors = {};

        function getQueryParam(name) {
            var search = window.location.search.replace(/^\?/, '');
            if (!search) return '';
            var parts = search.split('&');
            var idx;
            for (idx = 0; idx < parts.length; idx += 1) {
                var pair = parts[idx].split('=');
                if (decodeURIComponent(pair[0]) === name) return pair.length > 1 ? decodeURIComponent(pair.slice(1).join('=').replace(/\+/g, ' ')) : '';
            }
            return '';
        }
        function loadStoredCart() { try { return JSON.parse(localStorage.getItem(CART_KEY) || localStorage.getItem(LEGACY_CART_KEY) || '[]'); } catch (error) { return []; } }
        function loadWholesaleSession() { try { return JSON.parse(localStorage.getItem(WHOLESALE_SESSION_KEY) || 'null'); } catch (error) { return null; } }
        function normalizeWholesaleEmail(email) { return String(email || '').trim().toLowerCase(); }
        function normalizeLocationEntry(entry) {
            return {
                name: sanitizePlainText(entry && entry.name ? entry.name : '', 120),
                address: sanitizeMultilineText(entry && entry.address ? entry.address : '', 300),
                contactName: sanitizePlainText(entry && entry.contactName ? entry.contactName : '', 120),
                phone: sanitizePlainText(entry && entry.phone ? entry.phone : '', 20),
                isDefault: !!(entry && entry.isDefault)
            };
        }
        function normalizeLocations(list) {
            var source = Array.isArray(list) ? list : [];
            var results = [];
            var hasDefault = false;
            source.forEach(function (entry) {
                var normalized = normalizeLocationEntry(entry);
                if (!normalized.name || !normalized.address) return;
                if (normalized.isDefault && !hasDefault) hasDefault = true;
                else normalized.isDefault = false;
                results.push(normalized);
            });
            if (results.length && !hasDefault) results[0].isDefault = true;
            return results;
        }
        function loadLocalSavedLocations() { try { return normalizeLocations(JSON.parse(localStorage.getItem('makka_saved_locations') || '[]')); } catch (error) { return []; } }
        function saveLocalSavedLocations(list) { localStorage.setItem('makka_saved_locations', JSON.stringify(normalizeLocations(list))); }
        function persistLastOrder(order) {
            sessionStorage.setItem('makka_last_order', JSON.stringify(order));
            localStorage.removeItem('makka_last_order');
            localStorage.removeItem('drenasshop_last_order');
        }
        function rebuildProductIndex() {
            var nextIndex = {};
            var idx;
            for (idx = 0; idx < products.length; idx += 1) nextIndex[String(products[idx].id)] = products[idx];
            productIndex = nextIndex;
        }
        function getDefaultSavedLocationValue() {
            var idx;
            for (idx = 0; idx < savedLocations.length; idx += 1) if (savedLocations[idx].isDefault) return 'saved-' + idx;
            return savedLocations.length ? 'saved-0' : 'manual';
        }
        function getWholesaleUserDocument() {
            if (!window.db || !wholesaleSession || !wholesaleSession.email) return Promise.resolve(null);
            if (wholesaleSession.docId) {
                return db.collection('wholesale_users').doc(String(wholesaleSession.docId)).get().then(function (docSnap) {
                    if (docSnap.exists) {
                        var data = docSnap.data() || {};
                        data.id = docSnap.id;
                        return data;
                    }
                    return db.collection('wholesale_users').where('email', '==', normalizeWholesaleEmail(wholesaleSession.email)).limit(1).get().then(function (snapshot) {
                        if (snapshot.empty) return null;
                        var innerDoc = snapshot.docs[0];
                        var innerData = innerDoc.data() || {};
                        innerData.id = innerDoc.id;
                        return innerData;
                    });
                });
            }
            return db.collection('wholesale_users').where('email', '==', normalizeWholesaleEmail(wholesaleSession.email)).limit(1).get().then(function (snapshot) {
                if (snapshot.empty) return null;
                var docSnap = snapshot.docs[0];
                var data = docSnap.data() || {};
                data.id = docSnap.id;
                return data;
            });
        }
        function loadCheckoutLocations() {
            if (wholesaleMode) {
                if (!window.db || !wholesaleSession || !wholesaleSession.email) {
                    savedLocations = [];
                    selectedSavedLocationValue = 'manual';
                    return Promise.resolve([]);
                }
                return getWholesaleUserDocument().then(function (user) {
                    var fallback = user && user.location ? [{ name: 'العنوان الرئيسي', address: user.location, isDefault: true }] : [];
                    savedLocations = normalizeLocations(user && user.locations ? user.locations : fallback);
                    selectedSavedLocationValue = getDefaultSavedLocationValue();
                    return savedLocations;
                }).catch(function () {
                    savedLocations = [];
                    selectedSavedLocationValue = 'manual';
                    return [];
                });
            }
            savedLocations = loadLocalSavedLocations();
            selectedSavedLocationValue = getDefaultSavedLocationValue();
            return Promise.resolve(savedLocations);
        }
        function renderSavedLocationsHtml(values) {
            if (selectedDelivery !== 'delivery') return '';
            var html = '';
            var selectedValue = values.savedLocationValue || selectedSavedLocationValue || getDefaultSavedLocationValue();
            if (savedLocations.length) {
                html += '<div class="saved-location-group"><label>اختر عنواناً محفوظاً</label><div class="saved-location-boxes">';
                html += savedLocations.map(function (location, idx) {
                    var val = 'saved-' + idx;
                    var isSelected = selectedValue === val;
                    return '<div class="saved-location-box' + (isSelected ? ' selected' : '') + '" onclick="selectSavedLocation(\'' + val + '\')">'
                        + '<strong>' + escapeHtml(location.name) + '</strong>'
                        + (location.contactName ? '<p>👤 ' + escapeHtml(location.contactName) + '</p>' : '')
                        + (location.phone ? '<p>📞 ' + escapeHtml(location.phone) + '</p>' : '')
                        + '<p>📍 ' + escapeHtml(location.address) + '</p>'
                        + (location.isDefault ? '<span class="default-badge">افتراضي</span>' : '')
                        + '</div>';
                }).join('');
                html += '<div class="saved-location-box add-new-box' + (selectedValue === 'manual' ? ' selected' : '') + '" onclick="selectSavedLocation(\'manual\')">'
                    + '<span class="add-new-icon">＋</span>'
                    + '<strong>إضافة معلومات جديدة</strong>'
                    + '</div>';
                html += '</div></div>';
            } else if (wholesaleMode) html += '<div class="saved-location-note">لا توجد عناوين محفوظة في حسابك حالياً. يمكنك كتابة عنوان جديد لإتمام الطلب.</div>';
            if (!wholesaleMode) {
                html += '<div class="checkout-inline-grid"><input type="text" id="saveLocationName" class="checkout-inline-input" placeholder="اسم العنوان للحفظ لاحقاً" value="' + escapeHtml(values.saveLocationName || '') + '"><label class="checkout-checkbox-row"><input type="checkbox" id="saveLocationCheckbox"' + (values.saveLocationChecked ? ' checked' : '') + '>حفظ هذا العنوان لاستخدامه لاحقاً</label></div>';
            }
            return html;
        }
        function selectSavedLocation(value) {
            selectedSavedLocationValue = value || 'manual';
            var idx = -1;
            if (selectedSavedLocationValue.indexOf('saved-') === 0) idx = parseInt(selectedSavedLocationValue.split('-')[1], 10);
            var addressNode = document.getElementById('custAddress');
            var nameNode = document.getElementById('custName');
            var phoneNode = document.getElementById('custPhone');
            var manualFields = document.querySelector('.checkout-manual-fields');
            if (idx >= 0 && savedLocations[idx]) {
                if (addressNode) addressNode.value = savedLocations[idx].address || '';
                if (nameNode) nameNode.value = savedLocations[idx].contactName || '';
                if (phoneNode) phoneNode.value = savedLocations[idx].phone || '';
                if (manualFields) manualFields.style.display = 'none';
            } else {
                if (addressNode) addressNode.value = '';
                if (nameNode) nameNode.value = '';
                if (phoneNode) phoneNode.value = '';
                if (manualFields) manualFields.style.display = '';
            }
            // Re-render boxes to update selected state
            var boxesContainer = document.querySelector('.saved-location-boxes');
            if (boxesContainer) {
                var allBoxes = boxesContainer.querySelectorAll('.saved-location-box');
                allBoxes.forEach(function(box) { box.classList.remove('selected'); });
                var targetIdx = idx >= 0 ? idx : allBoxes.length - 1;
                if (allBoxes[targetIdx]) allBoxes[targetIdx].classList.add('selected');
            }
        }
        function handleSavedLocationChange(value) { selectSavedLocation(value); }
        function saveRegularLocationIfNeeded(address) {
            if (wholesaleMode || selectedDelivery !== 'delivery') return;
            var checkbox = document.getElementById('saveLocationCheckbox');
            var nameNode = document.getElementById('saveLocationName');
            var custNameNode = document.getElementById('custName');
            var custPhoneNode = document.getElementById('custPhone');
            var safeAddress = sanitizeMultilineText(address || '', 300);
            var locations;
            var idx;
            if (!checkbox || !checkbox.checked || !safeAddress) return;
            locations = loadLocalSavedLocations();
            for (idx = 0; idx < locations.length; idx += 1) if (String(locations[idx].address).trim() === safeAddress) return;
            locations.push({
                name: sanitizePlainText(nameNode && nameNode.value ? nameNode.value : 'عنوان محفوظ', 120) || 'عنوان محفوظ',
                address: safeAddress,
                contactName: sanitizePlainText(custNameNode && custNameNode.value ? custNameNode.value : '', 120),
                phone: sanitizePlainText(custPhoneNode && custPhoneNode.value ? custPhoneNode.value : '', 20),
                isDefault: locations.length === 0
            });
            saveLocalSavedLocations(locations);
            savedLocations = loadLocalSavedLocations();
            selectedSavedLocationValue = getDefaultSavedLocationValue();
        }
        function findProductById(productId) { return productIndex[String(productId)] || null; }
        function getAvailableProductQuantity(product) { return product && typeof product.quantity === 'number' ? product.quantity : 9999; }
        function getCartProductTotal(productId) {
            return cart.reduce(function (sum, item) {
                return String(item.id) === String(productId) ? sum + Math.max(1, parseInt(item.qty, 10) || 1) : sum;
            }, 0);
        }
        function canUseProductQuantity(product, requestedQty, excludeQty) {
            var available = getAvailableProductQuantity(product);
            var totalInCart = getCartProductTotal(product.id) - Math.max(0, parseInt(excludeQty, 10) || 0);
            if (totalInCart + requestedQty > available) {
                alert('الكمية المطلوبة غير متوفرة. المتوفر: ' + available + ' قطعة');
                return false;
            }
            return true;
        }
        function validateCheckoutQuantities() {
            var idx;
            for (idx = 0; idx < cart.length; idx += 1) {
                var item = cart[idx];
                var product = findProductById(item.id);
                if (!product) continue;
                if (product.quantity === 0 || product.status === 'soldout') {
                    alert('أحد المنتجات في السلة لم يعد متوفراً حالياً.');
                    return false;
                }
                if (!canUseProductQuantity(product, Math.max(1, parseInt(item.qty, 10) || 1), Math.max(1, parseInt(item.qty, 10) || 1))) return false;
            }
            return true;
        }
        function saveCart() { localStorage.setItem(CART_KEY, JSON.stringify(normalizeCartItems(cart, products))); localStorage.removeItem(LEGACY_CART_KEY); }
        function setStatus(message, type) { var node = document.getElementById('checkoutStatus'); if (!node) return; node.textContent = message || ''; node.className = 'checkout-status' + (type ? ' ' + type : ''); node.style.display = message ? 'block' : 'none'; }
        function initializeCheckout() {
            saveCart();
            rebuildProductIndex();
            setStatus('جاري تحميل بيانات الطلب...', '');
            loadCheckoutLocations().then(function () { renderCheckout(); setStatus(''); });
            if (!window.db) return;
            Promise.all([
                db.collection('products').get(),
                db.collection('discounts').get(),
                db.collection('settings').doc('config').get()
            ]).then(function (results) {
                var productSnapshot = results[0];
                var discountSnapshot = results[1];
                var settingsSnapshot = results[2];
                if (!productSnapshot.empty) products = productSnapshot.docs.map(function (docSnap) { var data = docSnap.data() || {}; data.id = docSnap.id; return normalizeProduct(data); });
                discounts = discountSnapshot.docs.map(function (docSnap) { var data = docSnap.data() || {}; data.id = docSnap.id; return normalizeDiscount(data); });
                siteSettings = normalizeSettings(settingsSnapshot.exists ? settingsSnapshot.data() : DEFAULT_SITE_SETTINGS);
                rebuildProductIndex();
                cart = normalizeCartItems(loadStoredCart(), products);
                saveCart();
                renderCheckout();
            }).catch(function () {
                renderCheckout();
            });
        }
        function getItemsCount() { return cart.reduce(function (sum, item) { return sum + Math.max(1, parseInt(item.qty, 10) || 1); }, 0); }
        function getSubtotal() { return cart.reduce(function (sum, item) { var product = findProductById(item.id); return product ? sum + (getFinalPrice(product, item.sizeIdx, discounts).final * item.qty) : sum; }, 0); }
        function getDeliveryCost() { return wholesaleMode || selectedDelivery === 'pickup' ? 0 : (DELIVERY_COSTS[selectedRegion] || 0); }
        function getTotal() { return getSubtotal() + getDeliveryCost(); }
        function getTotalLabel() { return wholesaleMode ? 'السعر حسب الاتفاق' : formatCurrency(getTotal()); }
        function getDeliveryLabel() { if (selectedDelivery === 'pickup') return 'استلام ذاتي'; return wholesaleMode ? 'يحدد مع مندوب المبيعات' : formatCurrency(getDeliveryCost()) + ' (' + DELIVERY_LABELS[selectedRegion] + ')'; }
        function changeQty(productId, sizeIdx, delta) { var idx; for (idx = 0; idx < cart.length; idx += 1) if (String(cart[idx].id) === String(productId) && parseInt(cart[idx].sizeIdx, 10) === parseInt(sizeIdx, 10)) { var product = findProductById(productId); if (product && delta > 0 && !canUseProductQuantity(product, cart[idx].qty + delta, cart[idx].qty)) return; cart[idx].qty += delta; if (cart[idx].qty < 1) { removeItem(productId, sizeIdx); return; } saveCart(); renderCheckout(); return; } }
        function removeItem(productId, sizeIdx) { cart = cart.filter(function (item) { return !(String(item.id) === String(productId) && parseInt(item.sizeIdx, 10) === parseInt(sizeIdx, 10)); }); saveCart(); renderCheckout(); }
        function selectDelivery(method) { var values = getFormValues(); selectedDelivery = method; localStorage.setItem(DELIVERY_KEY, method); if (method === 'pickup') selectedRegion = 'westbank'; renderCheckout(); restoreFormValues(values); }
        function selectRegion(region) { var values = getFormValues(); selectedRegion = region; renderCheckout(); restoreFormValues(values); }
        function getFormValues() { return { name: (document.getElementById('custName') || {}).value || '', phone: (document.getElementById('custPhone') || {}).value || '', address: (document.getElementById('custAddress') || {}).value || '', notes: (document.getElementById('custNotes') || {}).value || '', savedLocationValue: selectedSavedLocationValue || 'manual', saveLocationName: (document.getElementById('saveLocationName') || {}).value || '', saveLocationChecked: !!((document.getElementById('saveLocationCheckbox') || {}).checked) }; }
        function restoreFormValues(values) { var name = document.getElementById('custName'); var phone = document.getElementById('custPhone'); var address = document.getElementById('custAddress'); var notes = document.getElementById('custNotes'); var saveLocationName = document.getElementById('saveLocationName'); var saveLocationCheckbox = document.getElementById('saveLocationCheckbox'); if (name) name.value = values.name || ''; if (phone) phone.value = values.phone || ''; if (address) address.value = values.address || ''; if (notes) notes.value = values.notes || ''; if (saveLocationName) saveLocationName.value = values.saveLocationName || ''; if (saveLocationCheckbox) saveLocationCheckbox.checked = !!values.saveLocationChecked; selectedSavedLocationValue = values.savedLocationValue || selectedSavedLocationValue || getDefaultSavedLocationValue(); if (address && !address.value && selectedSavedLocationValue.indexOf('saved-') === 0) selectSavedLocation(selectedSavedLocationValue); }
        function setCheckoutFieldError(fieldId, message) {
            var field = document.getElementById(fieldId);
            var errorNode = document.getElementById(fieldId + 'Error');
            checkoutFieldErrors[fieldId] = message || '';
            if (field && field.className.indexOf('invalid') < 0) field.className += ' invalid';
            if (errorNode) errorNode.textContent = message || '';
        }
        function clearCheckoutFieldError(fieldId) {
            var field = document.getElementById(fieldId);
            var errorNode = document.getElementById(fieldId + 'Error');
            checkoutFieldErrors[fieldId] = '';
            if (field) field.className = field.className.replace(/\s?invalid/g, '');
            if (errorNode) errorNode.textContent = '';
        }
        function bindCheckoutValidation() {
            ['custName', 'custPhone', 'custAddress'].forEach(function (fieldId) {
                var field = document.getElementById(fieldId);
                if (!field) return;
                field.oninput = function () {
                    if (fieldId === 'custAddress' && selectedDelivery === 'pickup') return;
                    clearCheckoutFieldError(fieldId);
                };
            });
        }
        function renderCheckout() {
            var container = document.getElementById('checkoutContent'); if (!container) return;
            if (!cart.length) { container.innerHTML = '<div class="empty-checkout"><span>🛒</span><p>السلة فارغة حالياً.</p><a href="index.html" class="btn btn-primary wood-sign-btn">العودة للتسوق</a></div>'; return; }
            var values = getFormValues();
            var itemsHtml = cart.map(function (item) { var product = findProductById(item.id); if (!product) return ''; var sizeData = getSizeData(product, item.sizeIdx); var lineTotal = getFinalPrice(product, item.sizeIdx, discounts).final * item.qty; return '<div class="checkout-item"><img src="' + escapeHtml(product.image || FALLBACK_IMAGE) + '" alt="' + escapeHtml(product.name) + '" loading="lazy" onerror="this.src=\'' + FALLBACK_IMAGE + '\'"><div class="checkout-item-info"><h4>' + escapeHtml(product.name) + '</h4><span class="checkout-item-meta">' + escapeHtml(product.category) + '</span><span class="checkout-item-meta">' + escapeHtml(getSizeLabel(sizeData)) + ' • الكمية ' + item.qty + '</span></div><div><div class="checkout-item-price">' + (wholesaleMode ? 'السعر حسب الاتفاق' : formatCurrency(lineTotal)) + '</div><div class="cart-item-qty" style="justify-content:center;"><button type="button" data-product-id="' + escapeHtml(product.id) + '" data-size-idx="' + item.sizeIdx + '" onclick="changeQty(this.getAttribute(\'data-product-id\'), this.getAttribute(\'data-size-idx\'), -1)">−</button><span>' + item.qty + '</span><button type="button" data-product-id="' + escapeHtml(product.id) + '" data-size-idx="' + item.sizeIdx + '" onclick="changeQty(this.getAttribute(\'data-product-id\'), this.getAttribute(\'data-size-idx\'), 1)">+</button></div><button type="button" class="cart-item-remove" style="margin-top:8px;" data-product-id="' + escapeHtml(product.id) + '" data-size-idx="' + item.sizeIdx + '" onclick="removeItem(this.getAttribute(\'data-product-id\'), this.getAttribute(\'data-size-idx\'))">✕</button></div></div>'; }).join('');
            var html = '<div class="checkout-grid"><div><div class="checkout-card"><h3>المنتجات (' + getItemsCount() + ' قطعة)</h3><div class="checkout-items">' + itemsHtml + '</div></div>';
            html += '<div class="checkout-card" style="margin-top:18px;"><h3>طريقة الاستلام</h3><div class="delivery-options"><div class="delivery-option ' + (selectedDelivery === 'pickup' ? 'selected' : '') + '" onclick="selectDelivery(\'pickup\')"><strong>استلام ذاتي</strong><p>من المعرض أو المخزن حسب التنسيق.</p></div><div class="delivery-option ' + (selectedDelivery === 'delivery' ? 'selected' : '') + '" onclick="selectDelivery(\'delivery\')"><strong>توصيل</strong><p>' + (wholesaleMode ? 'سيتم تنسيق تكلفة التوصيل عند تأكيد طلب الجملة.' : 'اختر المنطقة لحساب تكلفة التوصيل.') + '</p></div></div>';
            if (selectedDelivery === 'delivery') html += '<div class="region-options" style="margin-top:14px;"><div class="region-option ' + (selectedRegion === 'westbank' ? 'selected' : '') + '" onclick="selectRegion(\'westbank\')">الضفة' + (wholesaleMode ? '' : '<br><small>₪20</small>') + '</div><div class="region-option ' + (selectedRegion === 'jerusalem' ? 'selected' : '') + '" onclick="selectRegion(\'jerusalem\')">القدس' + (wholesaleMode ? '' : '<br><small>₪30</small>') + '</div><div class="region-option ' + (selectedRegion === 'inside' ? 'selected' : '') + '" onclick="selectRegion(\'inside\')">الداخل' + (wholesaleMode ? '' : '<br><small>₪50</small>') + '</div></div>';
            var hasSavedSelected = selectedSavedLocationValue && selectedSavedLocationValue !== 'manual' && savedLocations.length;
            var hideManualFields = hasSavedSelected && selectedDelivery === 'delivery';
            html += '</div><div class="checkout-card" style="margin-top:18px;"><h3>معلومات التواصل</h3><p class="checkout-required-note">الحقول المعلّمة بعلامة * مطلوبة لإتمام الطلب.</p><div class="checkout-form-grid">' + renderSavedLocationsHtml(values) + '<div class="checkout-manual-fields" ' + (hideManualFields ? 'style="display:none;"' : '') + '><div class="checkout-field required"><label for="custName">الاسم الكامل</label><input type="text" id="custName" class="checkout-input" placeholder="الاسم الكامل" required><div class="checkout-field-error" id="custNameError"></div></div><div class="checkout-field required"><label for="custPhone">رقم الهاتف</label><input type="tel" id="custPhone" class="checkout-input" placeholder="05xxxxxxxx" inputmode="numeric" required><div class="checkout-field-error" id="custPhoneError"></div></div><div class="checkout-field required" ' + (selectedDelivery === 'pickup' ? 'style="display:none;"' : '') + '><label for="custAddress">' + (wholesaleMode ? 'عنوان الورشة أو موقع التنزيل' : 'العنوان أو موقع الورشة') + '</label><textarea id="custAddress" class="checkout-textarea" placeholder="' + (wholesaleMode ? 'اكتب عنوان الورشة أو موقع التنزيل' : 'العنوان أو موقع الورشة') + '"></textarea><div class="checkout-field-error" id="custAddressError"></div></div></div><div class="checkout-field"><label for="custNotes">ملاحظات إضافية</label><textarea id="custNotes" class="checkout-textarea" placeholder="ملاحظات إضافية (اختياري)"></textarea></div>' + (wholesaleMode ? '<div class="checkout-note-box">وضع الجملة مفعل: لن يتم عرض الأسعار، وسيتم إرسال الطلب عبر واتساب فقط بعنوان <strong>طلب جملة</strong>.</div>' : '') + '</div></div></div>';
            html += '<div><div class="checkout-card"><h3>ملخص الطلب</h3><div class="checkout-summary"><div class="checkout-summary-row"><span>عدد المنتجات</span><strong>' + getItemsCount() + ' قطعة</strong></div><div class="checkout-summary-row"><span>المجموع الفرعي</span><strong>' + (wholesaleMode ? 'السعر حسب الاتفاق' : formatCurrency(getSubtotal())) + '</strong></div><div class="checkout-summary-row"><span>التوصيل</span><strong>' + getDeliveryLabel() + '</strong></div><div class="checkout-summary-row total"><span>الإجمالي</span><strong>' + getTotalLabel() + '</strong></div></div><button type="button" class="checkout-submit" id="confirmOrderBtn" onclick="confirmOrder()">' + (wholesaleMode ? 'إرسال طلب الجملة عبر واتساب' : 'حفظ الطلب وإرساله') + '</button></div></div></div>';
            container.innerHTML = html; restoreFormValues(values); bindCheckoutValidation();
        }
        function buildOrder() {
            var name = sanitizePlainText((document.getElementById('custName').value || '').trim(), 120);
            var phone = sanitizePhoneNumber((document.getElementById('custPhone').value || '').trim());
            var address = sanitizeMultilineText((document.getElementById('custAddress') ? document.getElementById('custAddress').value : '').trim(), 400);
            var notes = sanitizeMultilineText((document.getElementById('custNotes').value || '').trim(), 500);
            return { id: makeOrderId(), wholesale: wholesaleMode, wholesaleEmail: wholesaleMode && wholesaleSession ? normalizeWholesaleEmail(wholesaleSession.email) : '', wholesaleUserId: wholesaleMode && wholesaleSession ? String(wholesaleSession.docId || '') : '', customerName: name, customerPhone: phone, address: address, notes: notes, delivery: selectedDelivery, region: selectedDelivery === 'pickup' ? 'pickup' : selectedRegion, deliveryCost: wholesaleMode ? 0 : getDeliveryCost(), subtotal: wholesaleMode ? 0 : getSubtotal(), total: wholesaleMode ? 0 : getTotal(), totalDisplay: wholesaleMode ? 'السعر حسب الاتفاق' : formatCurrency(getTotal()), savedLocationName: sanitizePlainText((document.getElementById('saveLocationName') || {}).value || '', 120), date: new Date().toISOString(), status: 'new', items: cart.map(function (item) { var product = findProductById(item.id); var sizeData = product ? getSizeData(product, item.sizeIdx) : { size: '-', unit: '' }; var finalPrice = product ? getFinalPrice(product, item.sizeIdx, discounts).final : 0; return { productId: item.id, name: product ? product.name : 'منتج', brand: product ? product.brand : '', category: product ? product.category : '', image: product ? product.image : '', sizeIdx: item.sizeIdx, sizeLabel: getSizeLabel(sizeData), qty: item.qty, price: wholesaleMode ? null : finalPrice, lineTotal: wholesaleMode ? null : finalPrice * item.qty }; }) };
        }
        function buildWhatsAppMessage(order) {
            var header = order.wholesale ? 'طلب جملة:' : 'طلب جديد:';
            var itemsText = (order.items || []).map(function (item, index) { var line = (index + 1) + '. ' + item.name + ' - ' + item.sizeLabel + ' - الكمية ' + item.qty; if (!order.wholesale) line += ' - ' + item.lineTotal + ' شيكل'; return line; }).join('\n');
            var message = header + '\nرقم الطلب: ' + order.id + '\nالاسم: ' + order.customerName + '\nالهاتف: ' + order.customerPhone + '\nالاستلام: ' + (order.delivery === 'pickup' ? 'استلام ذاتي' : 'توصيل إلى ' + DELIVERY_LABELS[order.region]) + '\n';
            if (order.address && order.delivery !== 'pickup') message += 'العنوان: ' + order.address + '\n';
            message += 'المنتجات:\n' + itemsText + '\n';
            if (!order.wholesale) message += 'الإجمالي: ' + order.totalDisplay + '\n';
            if (order.notes) message += 'ملاحظات: ' + order.notes + '\n';
            return message;
        }
        function showOrderSuccess(order) {
            var whatsappUrl = buildWhatsAppUrl(siteSettings.whatsappNumber, buildWhatsAppMessage(order));
            setStatus('تم حفظ الطلب بنجاح. رقم الطلب: ' + order.id, 'success');
            persistLastOrder(order);
            if (order.wholesale) window.location.href = whatsappUrl;
            else window.location.href = 'confirmation.html';
        }
        function confirmOrder() {
            var savedIdx = -1;
            var name, phone, address;
            if (selectedSavedLocationValue && selectedSavedLocationValue.indexOf('saved-') === 0) {
                savedIdx = parseInt(selectedSavedLocationValue.split('-')[1], 10);
            }
            if (savedIdx >= 0 && savedLocations[savedIdx]) {
                name = sanitizePlainText(savedLocations[savedIdx].contactName || '', 120);
                phone = sanitizePhoneNumber(savedLocations[savedIdx].phone || '');
                address = sanitizeMultilineText(savedLocations[savedIdx].address || '', 400);
            } else {
                name = sanitizePlainText((document.getElementById('custName').value || '').trim(), 120);
                phone = sanitizePhoneNumber((document.getElementById('custPhone').value || '').trim());
                address = sanitizeMultilineText((document.getElementById('custAddress') ? document.getElementById('custAddress').value : '').trim(), 400);
            }
            clearCheckoutFieldError('custName');
            clearCheckoutFieldError('custPhone');
            clearCheckoutFieldError('custAddress');
            if (!name) { setCheckoutFieldError('custName', 'أدخل الاسم الكامل لإتمام الطلب.'); return; }
            if (!phone) { setCheckoutFieldError('custPhone', 'أدخل رقم الهاتف حتى نتواصل معك.'); return; }
            if (!/^\+?\d{9,15}$/.test(phone)) { setCheckoutFieldError('custPhone', 'أدخل رقم هاتف صالحاً بصيغة صحيحة.'); return; }
            if (selectedDelivery === 'delivery' && !address) { setCheckoutFieldError('custAddress', 'أدخل عنوان التوصيل قبل حفظ الطلب.'); return; }
            if (!validateCheckoutQuantities()) return;
            saveRegularLocationIfNeeded(address);
            var order = buildOrder(); var button = document.getElementById('confirmOrderBtn'); if (button) { button.disabled = true; button.textContent = 'جاري حفظ الطلب...'; }
            setStatus('جاري التحقق من المخزون...', '');
            // Server-side stock validation
            var stockItems = cart.map(function(item) { return { productId: item.id, qty: item.qty }; });
            fetch('https://makka-api.alsadiayham.workers.dev/api/validate-stock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: stockItems })
            }).then(function(res) { return res.json(); }).then(function(data) {
                if (data.valid === false && data.errors && data.errors.length) {
                    var msgs = data.errors.map(function(e) { return e.productId + ': متوفر ' + e.available + ' فقط'; });
                    alert('بعض المنتجات غير متوفرة بالكمية المطلوبة:\n' + msgs.join('\n'));
                    if (button) { button.disabled = false; button.textContent = wholesaleMode ? 'إرسال طلب الجملة عبر واتساب' : 'حفظ الطلب وإرساله'; }
                    setStatus('', '');
                    return;
                }
                saveOrderToFirestore(order, button);
            }).catch(function() {
                // If API unreachable, proceed with local validation only
                saveOrderToFirestore(order, button);
            });
        }
        function saveOrderToFirestore(order, button) {
            setStatus('جاري حفظ الطلب...', '');
            if (!window.db) { localStorage.setItem(CART_KEY, '[]'); cart = []; showOrderSuccess(order); return; }
            db.collection('orders').doc(order.id).set(order).then(function () { localStorage.setItem(CART_KEY, '[]'); cart = []; showOrderSuccess(order); }).catch(function (error) { reportClientError(error); setStatus('', ''); alert('تعذر حفظ الطلب حالياً، حاول مرة أخرى.'); if (button) { button.disabled = false; button.textContent = wholesaleMode ? 'إرسال طلب الجملة عبر واتساب' : 'حفظ الطلب وإرساله'; } });
        }
        document.addEventListener('DOMContentLoaded', initializeCheckout);
    </script>
</body>
